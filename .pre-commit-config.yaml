repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/semgrep/semgrep
    rev: v1.165.0
    hooks:
      - id: semgrep
        args:
          - --config
          - auto
          - --error
          - --skip-unknown-extensions
        files: ^(app/.*\.(py|html)|Dockerfile|\.gitlab-ci\.yml)$

  - repo: https://github.com/pypa/pip-audit
    rev: v2.9.0
    hooks:
      - id: pip-audit
        args:
          - -r
          - requirements.txt
        pass_filenames: false
